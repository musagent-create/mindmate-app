<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS Test — Safari Debug v2</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 40px auto; padding: 20px; }
    button { display: block; width: 100%; padding: 16px; margin: 8px 0; font-size: 18px; border-radius: 12px; border: none; color: white; cursor: pointer; }
    .green { background: #4A9B8F; }
    .orange { background: #C4956A; }
    .red { background: #E07B6A; }
    .blue { background: #4A7B9B; }
    #log { background: #f5f5f5; padding: 12px; border-radius: 8px; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>🔊 TTS Debug v2</h1>
  <p id="voices">Stemmer: loading...</p>

  <button class="green" onclick="testDirect()">Test 1: Direkte speak ✅</button>
  <button class="orange" onclick="testSpeakAfterSTT()">Test 2: Speak → STT → Speak (kerneproblemet)</button>
  <button class="red" onclick="testSpeakAfterSTT_AudioCtx()">Test 3: Speak → STT → AudioCtx unlock → Speak</button>
  <button class="blue" onclick="testSpeakAfterSTT_Silent()">Test 4: Speak → STT → Silent speak → Speak</button>
  <button class="green" onclick="testSpeakAfterSTT_UserMedia()">Test 5: Speak → STT → getUserMedia → Speak</button>

  <div id="log"></div>

  <script>
    const log = (msg) => {
      const el = document.getElementById('log');
      el.textContent += new Date().toLocaleTimeString() + ' — ' + msg + '\n';
      el.scrollTop = el.scrollHeight;
    };

    let danishVoice = null;
    const loadVoices = () => {
      const voices = speechSynthesis.getVoices();
      danishVoice = voices.find(v => v.lang === 'da-DK')
        || voices.find(v => v.lang.startsWith('da'));
      document.getElementById('voices').textContent =
        'Stemmer: ' + voices.length + ', dansk: ' + (danishVoice ? danishVoice.name : 'INGEN');
    };
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
      return new Promise((resolve) => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'da-DK';
        u.rate = 0.85;
        if (danishVoice) u.voice = danishVoice;

        let done = false;
        const finish = (reason) => {
          if (done) return;
          done = true;
          log('  ✓ speak DONE (' + reason + ')');
          resolve();
        };

        u.onend = () => finish('onend');
        u.onerror = (e) => { log('  ✗ speak ERROR: ' + e.error); finish('error'); };

        const timer = setTimeout(() => finish('timeout'), Math.max(4000, text.length * 100 + 2000));
        u.addEventListener('end', () => clearTimeout(timer));

        log('  → speak: "' + text.substring(0, 40) + '"');
        speechSynthesis.speak(u);
      });
    }

    function listen(maxMs = 5000) {
      return new Promise((resolve) => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { log('  ✗ Ingen STT!'); resolve(''); return; }
        const r = new SR();
        r.lang = 'da-DK';
        r.continuous = false;
        r.interimResults = false;

        let resolved = false;
        const done = (text) => {
          if (resolved) return;
          resolved = true;
          resolve(text);
        };

        r.onresult = (e) => {
          const text = e.results[0][0].transcript;
          log('  ✓ STT fanget: "' + text + '"');
          done(text);
        };
        r.onerror = (e) => { log('  ✗ STT error: ' + e.error); done('test tale'); };
        r.onend = () => { if (!resolved) { log('  ⚠ STT ended uden resultat'); done('test tale'); } };

        // Auto-stop efter maxMs
        setTimeout(() => { try { r.stop(); } catch(e){} }, maxMs);

        log('  → Lytter (' + maxMs/1000 + 's)... sig noget!');
        r.start();
      });
    }

    // Test 1: Direct speak
    async function testDirect() {
      log('TEST 1: Direkte speak');
      await speak('Hej, dette er en direkte test af dansk tale.');
      log('TEST 1: ✅ Færdig\n');
    }

    // Test 2: Speak → STT → Speak (det vi gør i appen nu)
    async function testSpeakAfterSTT() {
      log('TEST 2: Speak → STT → Speak (ingen workaround)');
      await speak('Sig noget, så svarer jeg.');
      const text = await listen(5000);
      log('  → Forsøger speak efter STT...');
      await speak('Du sagde: ' + text);
      log('TEST 2: Færdig\n');
    }

    // Test 3: AudioContext re-unlock efter STT
    async function testSpeakAfterSTT_AudioCtx() {
      log('TEST 3: Speak → STT → AudioContext unlock → Speak');
      await speak('Sig noget efter bippet.');
      const text = await listen(5000);

      // AudioContext unlock trick
      log('  → AudioContext unlock...');
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      await ctx.resume();
      const osc = ctx.createOscillator();
      osc.frequency.value = 0;
      osc.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.01);
      await new Promise(r => setTimeout(r, 100));
      ctx.close();

      log('  → Forsøger speak efter AudioCtx unlock...');
      await speak('Du sagde: ' + text);
      log('TEST 3: Færdig\n');
    }

    // Test 4: Silent utterance re-unlock efter STT
    async function testSpeakAfterSTT_Silent() {
      log('TEST 4: Speak → STT → Silent utterance → Speak');
      await speak('Sig noget til mig.');
      const text = await listen(5000);

      // Silent speak to re-unlock
      log('  → Silent utterance unlock...');
      const silent = new SpeechSynthesisUtterance('');
      silent.volume = 0;
      speechSynthesis.speak(silent);
      await new Promise(r => setTimeout(r, 200));

      log('  → Forsøger speak efter silent unlock...');
      await speak('Du sagde: ' + text);
      log('TEST 4: Færdig\n');
    }

    // Test 5: getUserMedia re-trigger efter STT
    async function testSpeakAfterSTT_UserMedia() {
      log('TEST 5: Speak → STT → getUserMedia → Speak');
      await speak('Sig noget venligst.');
      const text = await listen(5000);

      // Re-trigger audio session
      log('  → getUserMedia unlock...');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
      } catch(e) { log('  ✗ getUserMedia fejl: ' + e.message); }
      await new Promise(r => setTimeout(r, 200));

      log('  → Forsøger speak efter getUserMedia...');
      await speak('Du sagde: ' + text);
      log('TEST 5: Færdig\n');
    }
  </script>
</body>
</html>
